<head>

<body>

    <div id="sideMenu" class="side-menu">
        <div class="side-menu-header" style="align-items: center; justify-content: space-between;">
            <img src="graphics/logo/Dinkbai%20logo.png" alt="Dinkbai Logo" style="max-height: 40px; width: auto;">
            <button class="icon-btn" onclick="toggleSideMenu()"

        </div>
        <div class="side-menu-content">
            <a href="index.html" class="side-menu-item">Home / Queue</a>
            <a href="ranking.html" class="side-menu-item">Club Rankings</a>
            <a href="guide.html" class="side-menu-item">How It Works</a>
            <a href="store.html" class="side-menu-item" style="color: #fbbf24;">Store & Locker</a>
        </div>
        <div class="side-menu-theme-selector" style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--glass-border);">
            <div style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 1px; padding: 0 1rem;">Theme</div>
            <div style="display: flex; gap: 0.75rem; flex-wrap: wrap; padding: 0 1rem; justify-content: flex-start;">
                <button class="theme-btn" data-theme="default" onclick="setTheme('default')" style="background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); width: 36px; height: 36px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); cursor: pointer; box-shadow: 0 4px 10px rgba(139, 92, 246, 0.4);" title="Slate (Default)"></button>
                <button class="theme-btn" data-theme="midnight" onclick="setTheme('midnight')" style="background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); width: 36px; height: 36px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); cursor: pointer; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.4);" title="Midnight (OLED)"></button>
                <button class="theme-btn" data-theme="forest" onclick="setTheme('forest')" style="background: linear-gradient(135deg, #059669 0%, #10b981 100%); width: 36px; height: 36px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); cursor: pointer; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.4);" title="Forest"></button>
                <button class="theme-btn" data-theme="sunset" onclick="setTheme('sunset')" style="background: linear-gradient(135deg, #e11d48 0%, #f97316 100%); width: 36px; height: 36px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); cursor: pointer; box-shadow: 0 4px 10px rgba(249, 115, 22, 0.4);" title="Sunset"></button>
                <button class="theme-btn" data-theme="ocean" onclick="setTheme('ocean')" style="background: linear-gradient(135deg, #0284c7 0%, #0ea5e9 100%); width: 36px; height: 36px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); cursor: pointer; box-shadow: 0 4px 10px rgba(14, 165, 233, 0.4);" title="Ocean"></button>
            </div>
        </div>
    </div>

    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-container">
        <header class="glass-panel" style="display: flex; flex-direction: column; gap: 1rem;">
            <div style="display: flex; align-items: center; width: 100%; flex-wrap: wrap; gap: 1rem;">
                <div
                    style="flex: 1; display: flex; justify-content: flex-start; align-items: center; min-width: max-content;">
                    <div style="cursor: pointer; color: var(--text-color); display: flex; align-items: center;"
                        onclick="toggleSideMenu()" title="Open Menu">
                        <svg viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="2"
                            fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </div>
                </div>
                <div style="display: flex; justify-content: center; align-items: center;">
                    <img src="graphics/dink%20bai/DINK%20BAI%20TEXT.png" alt="Dink Bai"
                        style="max-height: 36px; width: auto;">
                </div>
                <div style="flex: 1; display: flex; justify-content: flex-end; align-items: center; gap: 0.5rem;" id="authUIContainer">
                    <button class="btn secondary" style="padding: 0.4rem 0.8rem; font-size: 0.85rem;" onclick="openClaimModal()">Claim Profile</button>
                    <button class="btn primary" style="padding: 0.4rem 0.8rem; font-size: 0.85rem;" onclick="openLoginModal()">Log In</button>
                </div>
            </div>
            
            <div id="loggedInUIContainer" style="display: none; align-items: center; justify-content: center; gap: 1rem; width: 100%; border-top: 1px solid var(--glass-border); padding-top: 1rem;">
                <div style="display: flex; align-items: center; gap: 0.5rem;" id="loggedInUserInfo">
                    <!-- User info will be rendered here -->
                </div>
                <button class="btn secondary" style="padding: 0.4rem 0.8rem; font-size: 0.85rem;" onclick="openMyProfileModal()">My Profile</button>
                <button class="btn secondary" style="padding: 0.4rem 0.8rem; font-size: 0.85rem;" onclick="logoutPlayer()">Log Out</button>
            </div>
        </header>

        
        <main style="flex: 1; padding-top: 1rem;">
            <div class="glass-panel" style="margin-bottom: 2rem; text-align: center;">
                <h1 style="margin-bottom: 0.5rem; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Dink Locker & Store</h1>
                <p style="color: var(--text-muted);">Customize your avatar with premium glowing borders.</p>
                <div style="margin-top: 1.5rem; display: inline-block; padding: 1rem 2rem; background: rgba(0,0,0,0.3); border-radius: 50px; border: 1px solid var(--glass-border);">
                    <span style="font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted);">Your Balance</span>
                    <div style="font-size: 2rem; font-weight: 800; color: #fbbf24; margin-top: 0.25rem;" id="storeCoinBalance">0 <span style="font-size: 1rem;">Coins</span></div>
                </div>
            </div>

            <h2 style="margin-bottom: 1rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 0.5rem;">Premium Borders</h2>
            
            <div id="storeItemsContainer" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem;">
                <!-- Store items will be rendered here by JS -->
            </div>
        </main>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, get, update } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
        import { getStorage, ref as storageRef, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAwb_nYHoagATSmGy1TCoZLkt9a9kBfbvQ",
            authDomain: "dinkbai-queueing.firebaseapp.com",
            databaseURL: "https://dinkbai-queueing-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dinkbai-queueing",
            storageBucket: "dinkbai-queueing.firebasestorage.app",
            messagingSenderId: "518522778086",
            appId: "1:518522778086:web:a43380de2a0eaccf3a2627",
            measurementId: "G-CRJRKKM37N"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);

        window.firebaseDb = db;
        window.firebaseRef = ref;
        window.firebaseOnValue = onValue;
        window.firebaseSet = set;
        window.firebaseGet = get;
        window.firebaseUpdate = update;
        
        window.firebaseStorage = storage;
        window.firebaseStorageRef = storageRef;
        window.firebaseUploadString = uploadString;
        window.firebaseGetDownloadURL = getDownloadURL;

        window.dispatchEvent(new Event('firebase-ready'));
    </script>
    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-bottom-bar">

                stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            Player
        </a>

        <a href="ranking.html" class="mobile-nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path>
                <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path>
                <path d="M4 22h16"></path>
                <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path>
                <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path>
                <path d="M18 2H6v7a6 6 0 0 0 12 0V2z"></path>
            </svg>
            Rankings
        </a>
    </nav>
    <script src="app.js?v=50"></script>
    <script>
        function toggleSideMenu() {
            const menu = document.getElementById('sideMenu');
            const overlay = document.getElementById('sideMenuOverlay');
            if (menu && overlay) {
                menu.classList.toggle('active');
                overlay.classList.toggle('active');
            }
        }
    </script>

    <script>
        const storeItems = [
            { id: 'neon-pulse', name: 'Neon Pulse', price: 500, class: 'neon-pulse', desc: 'A vibrant glowing cyan border.' },
            { id: 'inferno-ring', name: 'Inferno Ring', price: 1000, class: 'inferno-ring', desc: 'An animated fiery pulsating border.' },
            { id: 'diamond-crest', name: 'Diamond Crest', price: 2000, class: 'diamond-crest', desc: 'A premium thick icy-blue gleaming crest.' }
        ];

        function getLoggedInUser() {
            return localStorage.getItem('loggedInPlayerId');
        }

        function renderStore() {
            const loggedInUser = getLoggedInUser();
            if (!loggedInUser || !allPlayers[loggedInUser]) {
                document.getElementById('storeItemsContainer').innerHTML = '<p style="padding: 2rem; text-align: center; color: var(--text-muted); grid-column: 1 / -1;">Please Log In or Claim your Profile to access the store.</p>';
                document.getElementById('storeCoinBalance').innerHTML = '0 <span style="font-size: 1rem;">Coins</span>';
                return;
            }

            const p = allPlayers[loggedInUser];
            document.getElementById('storeCoinBalance').innerHTML = (p.coins || 0) + ' <span style="font-size: 1rem;">Coins</span>';

            const container = document.getElementById('storeItemsContainer');
            container.innerHTML = '';

            storeItems.forEach(item => {
                const isUnlocked = p.unlockedCosmetics && p.unlockedCosmetics.includes(item.id);
                const isEquipped = p.equippedBorder === item.id;

                let actionBtn = '';
                if (isEquipped) {
                    actionBtn = `<button class="btn" style="width: 100%; background: #10b981; pointer-events: none;">Equipped</button>`;
                } else if (isUnlocked) {
                    actionBtn = `<button class="btn" style="width: 100%; background: var(--primary-gradient);" onclick="handleEquip('${item.id}')">Equip</button>`;
                } else {
                    const canAfford = (p.coins || 0) >= item.price;
                    const btnStyle = canAfford ? 'background: #fbbf24; color: #000;' : 'background: rgba(255,255,255,0.1); color: var(--text-muted); cursor: not-allowed;';
                    const onclickStr = canAfford ? `onclick="handleBuy('${item.id}', ${item.price})"` : '';
                    actionBtn = `<button class="btn" style="width: 100%; ${btnStyle}" ${onclickStr}>${item.price} Coins</button>`;
                }

                // Create a fake player object to render the avatar preview
                const previewPlayer = { ...p, equippedBorder: item.id, id: 'preview_fake' };
                const avatarHTML = window.renderAvatar ? renderAvatar(previewPlayer) : '<div class="avatar">?</div>';

                container.innerHTML += `
                    <div class="glass-panel" style="display: flex; flex-direction: column; align-items: center; padding: 2rem; text-align: center;">
                        <div style="margin-bottom: 1.5rem; transform: scale(1.5);">
                            ${avatarHTML}
                        </div>
                        <h3 style="margin-bottom: 0.5rem;">${item.name}</h3>
                        <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.5rem; flex: 1;">${item.desc}</p>
                        ${actionBtn}
                    </div>
                `;
            });
            
            // Add a "None" unequip option if they have something equipped
            if (p.equippedBorder && p.equippedBorder !== 'none') {
                container.innerHTML += `
                    <div class="glass-panel" style="display: flex; flex-direction: column; align-items: center; padding: 2rem; text-align: center; justify-content: center;">
                        <h3 style="margin-bottom: 1.5rem;">Remove Border</h3>
                        <button class="btn" style="width: 100%; background: rgba(255,255,255,0.1);" onclick="handleEquip('none')">Unequip</button>
                    </div>
                `;
            }
        }

        window.handleBuy = function(id, price) {
            const loggedInUser = getLoggedInUser();
            if (confirm(`Buy this border for ${price} coins?`)) {
                if (window.buyCosmetic && window.buyCosmetic(loggedInUser, id, price)) {
                    renderStore();
                    alert('Successfully purchased and equipped!');
                } else {
                    alert('Not enough coins.');
                }
            }
        };

        window.handleEquip = function(id) {
            const loggedInUser = getLoggedInUser();
            if(window.equipCosmetic) {
                window.equipCosmetic(loggedInUser, id);
                renderStore();
            }
        };

        // Listen for data updates to re-render
        setInterval(() => {
            if (window.isFirebaseReady) renderStore();
        }, 1000);
        
    </script>
</body>

</html>
