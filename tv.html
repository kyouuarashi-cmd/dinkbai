<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dink Bai - TV Display</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=202607062330">
    <style>
        /* TV Display Specific Overrides */
        body {
            font-size: 1.2rem;
        }

        .matchups-container,
        .courts-grid {
            display: grid;
            gap: 2rem;
            grid-template-columns: 1fr;
        }

        @media (min-width: 900px) {
            .matchups-container {
                grid-template-columns: repeat(2, 1fr);
            }

            .courts-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1400px) {
            .courts-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 1100px) {
            .main-content {
                grid-template-columns: 2fr 1fr;
                gap: 3rem;
            }
        }

        .tv-column {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .matchup-row {
            flex-direction: column;
            padding: 1.5rem;
            gap: 1.5rem;
        }

        .matchup-teams {
            width: 100%;
            justify-content: space-around;
        }

        .mvp-section {
            height: 100%;
        }
    </style>
</head>

<body>
    <!-- Toast Notifications -->
    <div id="toastContainer" class="toast-container"></div>
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading...</div>
    </div>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-container">
        <!-- Left Sidebar -->
        <aside class="left-sidebar">
            <div class="logo" style="margin-bottom: 2rem; display: flex; align-items: center; justify-content: flex-start;">
                <img src="graphics/logo/Dinkbai%20logo.png" alt="Dinkbai Logo" style="height: 40px; margin-right: 1rem; cursor: pointer;">
                <span style="font-family: var(--header-font); color: var(--gold-accent); font-size: 1.2rem; font-weight: 700; text-transform: uppercase;">Dink Bai</span>
            </div>
            
            <button class="btn primary huge-play-btn" onclick="window.location.href='index.html'">PLAY</button>

            <nav class="side-nav">
                <a href="home.html" class="nav-link">HOME</a>
                <a href="ranking.html" class="nav-link">RANKINGS</a>
                <a href="guide.html" class="nav-link">HOW IT WORKS</a>
                <a href="store.html" class="nav-link" style="color: var(--gold-accent);">STORE</a>
            </nav>

            <div class="online-players-section" style="margin-top: 3rem; flex-grow: 1;">
                <h4 style="font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 1rem; display: flex; justify-content: space-between;">Online Players <span>+</span></h4>
                <div id="socialSidebarContainer" class="social-list">
                    <div style="color: var(--text-muted); font-size: 0.9rem;">No players online</div>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <div class="main-content-area">
            <header class="header">
                <div class="search-bar" style="flex-grow: 1; max-width: 400px; background: rgba(0,0,0,0.3); border-radius: 50px; padding: 0.8rem 1.5rem; display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.05);">
                    <span style="color: var(--text-muted); margin-right: 10px;">🔍</span>
                    <input type="text" placeholder="Search for players..." style="background: transparent; border: none; outline: none; color: white; width: 100%; font-size: 1rem;">
                </div>
                <div style="display: flex; justify-content: flex-end; align-items: center; gap: 1rem;">
                    <div id="authUIContainer" style="display: flex; gap: 0.5rem;">
                    </div>
                </div>
            </header>

        <main class="main-content">
            <!-- Left Column: Matchups & Courts -->
            <div class="tv-column">
                <!-- Next Matchups Section -->
                <section class="next-matchups-section glass-panel">
                    <h2
                        style="font-size: 2rem; text-align: center; margin-bottom: 2rem; border-bottom: 2px solid var(--glass-border); padding-bottom: 1rem;">
                        Next In Line</h2>
                    <div id="nextMatchupsContainer" class="matchups-container">
                        <!-- Matchups will appear here -->
                    </div>
                </section>

                <!-- Courts Display Section -->
                <section class="courts-section glass-panel">
                    <h2
                        style="font-size: 2rem; text-align: center; margin-bottom: 2rem; border-bottom: 2px solid var(--glass-border); padding-bottom: 1rem;">
                        Active Courts</h2>
                    <div id="courtsContainer" class="courts-grid">
                        <!-- Courts will be generated here dynamically -->
                    </div>
                </section>
            </div>

            <!-- Right Column: Leaderboard -->
            <div class="tv-column">
                <!-- MVP Leaderboard Section -->
                <section class="mvp-section glass-panel">
                    <h2
                        style="font-size: 1.8rem; text-align: center; margin-bottom: 2rem; border-bottom: 2px solid var(--glass-border); padding-bottom: 1rem;">
                        MVP Leaderboard</h2>
                    <div id="mvpContainer">
                        <p style="text-align: center; opacity: 0.6; padding: 2rem 0;">No games completed yet.</p>
                    </div>
                </section>
            </div>

            <!-- HIDDEN: Required by app.js -->
            <div style="display: none;">
                <section class="queues-section">
                    <div id="stack-manual"></div>
                    <div id="stack-beginner"></div>
                    <div id="stack-intermediate"></div>
                    <div id="stack-advanced"></div>
                </section>
                <section class="standby-section">
                    <div id="stack-standby"></div>
                </section>
            </div>
        </main>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, get, update } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
        import { getStorage, ref as storageRef, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAwb_nYHoagATSmGy1TCoZLkt9a9kBfbvQ",
            authDomain: "dinkbai-queueing.firebaseapp.com",
            databaseURL: "https://dinkbai-queueing-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dinkbai-queueing",
            storageBucket: "dinkbai-queueing.firebasestorage.app",
            messagingSenderId: "518522778086",
            appId: "1:518522778086:web:a43380de2a0eaccf3a2627",
            measurementId: "G-CRJRKKM37N"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);

        window.firebaseDb = db;
        window.firebaseRef = ref;
        window.firebaseOnValue = onValue;
        window.firebaseSet = set;
        window.firebaseGet = get;
        window.firebaseUpdate = update;
        
        window.firebaseStorage = storage;
        window.firebaseStorageRef = storageRef;
        window.firebaseUploadString = uploadString;
        window.firebaseGetDownloadURL = getDownloadURL;

        window.dispatchEvent(new Event('firebase-ready'));
    </script>
    <script src="app.js?v=202607062900"></script>
</body>

</html>
