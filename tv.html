<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dink Bai - TV Display</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=202607062330">
    <style>
        /* TV Display Specific Overrides */
        body {
            font-size: 1.2rem;
        }

        .matchups-container,
        .courts-grid {
            display: grid;
            gap: 2rem;
            grid-template-columns: 1fr;
        }

        @media (min-width: 900px) {
            .matchups-container {
                grid-template-columns: repeat(2, 1fr);
            }

            .courts-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1400px) {
            .courts-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 1100px) {
            .main-content {
                grid-template-columns: 2fr 1fr;
                gap: 3rem;
            }
        }

        .tv-column {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .matchup-row {
            flex-direction: column;
            padding: 1.5rem;
            gap: 1.5rem;
        }

        .matchup-teams {
            width: 100%;
            justify-content: space-around;
        }

        .mvp-section {
            height: 100%;
        }
    </style>
</head>

<body>
    <!-- Toast Notifications -->
    <div id="toastContainer" class="toast-container"></div>
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading...</div>
    </div>
    <!-- Side Menu -->
    <div id="sideMenuOverlay" class="side-menu-overlay" onclick="toggleSideMenu()"></div>
    <div id="sideMenu" class="side-menu">
        <div class="side-menu-header" style="align-items: center; justify-content: space-between;">
            <img src="graphics/logo/Dinkbai%20logo.png" alt="Dinkbai Logo" style="max-height: 40px; width: auto;">
            <button class="icon-btn" onclick="toggleSideMenu()"
                style="font-size: 1.5rem; line-height: 1;">&times;</button>
        </div>
        <div class="side-menu-content">
            <a href="index.html" class="side-menu-item">Player View</a>
            <a href="ranking.html" class="side-menu-item">Club Rankings</a>
            <a href="guide.html" class="side-menu-item">How It Works</a>
            <a href="store.html" class="side-menu-item" style="color: #fbbf24;">Store & Locker</a>
            <a href="admin.html" class="side-menu-item" style="margin-top: 1rem;">Admin Panel</a>
        </div>
    </div>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-container">
        <header class="glass-panel"
            style="display: flex; align-items: center; width: 100%; flex-wrap: wrap; padding: 1rem; gap: 1rem; margin-bottom: 2rem;">
            <div
                style="flex: 1; display: flex; justify-content: flex-start; align-items: center; min-width: max-content;">
                <div style="cursor: pointer; color: var(--text-color); display: flex; align-items: center;"
                    onclick="toggleSideMenu()" title="Open Menu">
                    <svg viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </div>
            </div>
            <div style="display: flex; justify-content: center; align-items: center;">
                <img src="graphics/dink%20bai/DINK%20BAI%20TEXT.png" alt="Dink Bai"
                    style="max-height: 60px; width: auto;">
            </div>
            <div style="flex: 1;"></div>
        </header>

        <main class="main-content">
            <!-- Left Column: Matchups & Courts -->
            <div class="tv-column">
                <!-- Next Matchups Section -->
                <section class="next-matchups-section glass-panel">
                    <h2
                        style="font-size: 2rem; text-align: center; margin-bottom: 2rem; border-bottom: 2px solid var(--glass-border); padding-bottom: 1rem;">
                        Next In Line</h2>
                    <div id="nextMatchupsContainer" class="matchups-container">
                        <!-- Matchups will appear here -->
                    </div>
                </section>

                <!-- Courts Display Section -->
                <section class="courts-section glass-panel">
                    <h2
                        style="font-size: 2rem; text-align: center; margin-bottom: 2rem; border-bottom: 2px solid var(--glass-border); padding-bottom: 1rem;">
                        Active Courts</h2>
                    <div id="courtsContainer" class="courts-grid">
                        <!-- Courts will be generated here dynamically -->
                    </div>
                </section>
            </div>

            <!-- Right Column: Leaderboard -->
            <div class="tv-column">
                <!-- MVP Leaderboard Section -->
                <section class="mvp-section glass-panel">
                    <h2
                        style="font-size: 1.8rem; text-align: center; margin-bottom: 2rem; border-bottom: 2px solid var(--glass-border); padding-bottom: 1rem;">
                        MVP Leaderboard</h2>
                    <div id="mvpContainer">
                        <p style="text-align: center; opacity: 0.6; padding: 2rem 0;">No games completed yet.</p>
                    </div>
                </section>
            </div>

            <!-- HIDDEN: Required by app.js -->
            <div style="display: none;">
                <section class="queues-section">
                    <div id="stack-manual"></div>
                    <div id="stack-beginner"></div>
                    <div id="stack-intermediate"></div>
                    <div id="stack-advanced"></div>
                </section>
                <section class="standby-section">
                    <div id="stack-standby"></div>
                </section>
            </div>
        </main>
    </div>

    <script type="module" src="firebase-init.js"></script>
    <script src="app.js?v=20260707224000"></script>
</body>

</html>
