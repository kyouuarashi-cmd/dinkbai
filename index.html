<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paddle Stacking Queue</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-container">
        <header class="glass-panel">
            <h1>Paddle Stacking</h1>
            <div class="court-controls">
                <label for="courtCount">Total Courts:</label>
                <input type="number" id="courtCount" min="1" max="20" value="4">
                <button id="setCourtsBtn" class="btn primary">Update Courts</button>
            </div>
        </header>

        <main class="main-content">
            <!-- Add Player Section -->
            <section class="add-player-section glass-panel">
                <h2>Add Solo Player</h2>
                <form id="addPlayerForm">
                    <div id="soloInputs" class="input-group">
                        <input type="text" id="playerName" placeholder="Player Name" required autocomplete="off">
                        <select id="playerSkill" required>
                            <option value="" disabled selected>Select Skill Level</option>
                            <option value="beginner">Beginner (Black)</option>
                            <option value="intermediate">Intermediate (Blue)</option>
                            <option value="advanced">Advanced (Red)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn secondary">Drop Paddle</button>
                </form>
            </section>

            <!-- Manual Group Section -->
            <section class="manual-group-section glass-panel" style="margin-top: 2rem; margin-bottom: 2rem;">
                <h2>Create Manual Group</h2>
                <p style="font-size: 0.8rem; opacity: 0.8; margin-bottom: 1rem;">Select exactly 2 or 4 waiting players to form a group.</p>
                <div id="manualPlayerList" style="max-height: 200px; overflow-y: auto; margin-bottom: 1rem; background: rgba(0,0,0,0.2); border-radius: 8px; padding: 0.5rem;">
                    <!-- Checkboxes will be populated here by JS -->
                </div>
                <button type="button" id="btnCreateManualGroup" class="btn primary" onclick="createManualGroup()">Group Selected Players</button>
            </section>

            <!-- Queue Display Section -->
            <section class="queues-section">
                <div class="queue-column glass-panel manual-queue">
                    <h3>Manual <span class="badge" style="background: #e2e8f0; color: #1e293b;">Group</span></h3>
                    <div class="paddle-stack" id="stack-manual">
                        <!-- Paddles will appear here -->
                    </div>
                </div>

                <div class="queue-column glass-panel beginner-queue">
                    <h3>Beginner <span class="badge black">Black</span></h3>
                    <div class="paddle-stack" id="stack-beginner">
                        <!-- Paddles will appear here -->
                    </div>
                </div>
                
                <div class="queue-column glass-panel intermediate-queue">
                    <h3>Intermediate <span class="badge blue">Blue</span></h3>
                    <div class="paddle-stack" id="stack-intermediate">
                        <!-- Paddles will appear here -->
                    </div>
                </div>

                <div class="queue-column glass-panel advanced-queue">
                    <h3>Advanced <span class="badge red">Red</span></h3>
                    <div class="paddle-stack" id="stack-advanced">
                        <!-- Paddles will appear here -->
                    </div>
                </div>
            </section>

            <!-- Standby Section -->
            <section class="standby-section glass-panel">
                <h2>Standby Area <span style="font-size: 0.9rem; font-weight: 300; opacity: 0.7;">(Taking a break)</span></h2>
                <div class="paddle-stack horizontal-stack" id="stack-standby">
                    <!-- Standby paddles will appear here -->
                </div>
            </section>

            <!-- Next Matchups Section -->
            <section class="next-matchups-section glass-panel">
                <h2>Next In Line</h2>
                <div id="nextMatchupsContainer" class="matchups-container">
                    <!-- Matchups will appear here -->
                </div>
            </section>

            <!-- Courts Display Section -->
            <section class="courts-section glass-panel">
                <h2>Active Courts</h2>
                <div id="courtsContainer" class="courts-grid">
                    <!-- Courts will be generated here dynamically -->
                </div>
            </section>
        </main>
    </div>

    <script src="app.js?v=2"></script>
</body>
</html>
