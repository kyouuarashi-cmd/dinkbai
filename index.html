<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paddle Stacking Queue</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=44">
</head>

<body>
    <!-- Side Menu -->
    <div id="sideMenuOverlay" class="side-menu-overlay" onclick="toggleSideMenu()"></div>
    <div id="sideMenu" class="side-menu">
        <div class="side-menu-header" style="align-items: center; justify-content: space-between;">
            <img src="graphics/logo/Dinkbai%20logo.png" alt="Dinkbai Logo" style="max-height: 40px; width: auto;">
            <button class="icon-btn" onclick="toggleSideMenu()"
                style="font-size: 1.5rem; line-height: 1;">&times;</button>
        </div>
        <div class="side-menu-content">
            <a href="ranking.html" class="side-menu-item">Club Rankings</a>
        </div>
    </div>

    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-container">
        <header class="glass-panel" style="display: flex; flex-direction: column; gap: 1rem;">
            <div style="display: flex; align-items: center; width: 100%; flex-wrap: wrap; gap: 1rem;">
                <div
                    style="flex: 1; display: flex; justify-content: flex-start; align-items: center; min-width: max-content;">
                    <div style="cursor: pointer; color: var(--text-color); display: flex; align-items: center;"
                        onclick="toggleSideMenu()" title="Open Menu">
                        <svg viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="2"
                            fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </div>
                </div>
                <div style="display: flex; justify-content: center; align-items: center;">
                    <img src="graphics/dink%20bai/DINK%20BAI%20TEXT.png" alt="Dink Bai"
                        style="max-height: 36px; width: auto;">
                </div>
                <div style="flex: 1;"></div>
            </div>
        </header>

        <main class="main-content">
            <!-- Add Player Section -->


            <!-- Queue Display Section -->
            <section class="queues-section">
                <div class="queue-column glass-panel manual-queue">
                    <h3>Manual <span class="badge" style="background: #e2e8f0; color: #1e293b;">Group</span></h3>
                    <div class="paddle-stack" id="stack-manual">
                        <!-- Paddles will appear here -->
                    </div>
                </div>

                <div class="queue-column glass-panel beginner-queue">
                    <h3>Beginner <span class="badge black">Black</span></h3>
                    <div class="paddle-stack" id="stack-beginner">
                        <!-- Paddles will appear here -->
                    </div>
                </div>

                <div class="queue-column glass-panel intermediate-queue">
                    <h3>Intermediate <span class="badge blue">Blue</span></h3>
                    <div class="paddle-stack" id="stack-intermediate">
                        <!-- Paddles will appear here -->
                    </div>
                </div>

                <div class="queue-column glass-panel advanced-queue">
                    <h3>Advanced <span class="badge red">Red</span></h3>
                    <div class="paddle-stack" id="stack-advanced">
                        <!-- Paddles will appear here -->
                    </div>
                </div>
            </section>

            <!-- Standby Section -->
            <section class="standby-section glass-panel">
                <h2>Standby Area <span style="font-size: 0.9rem; font-weight: 300; opacity: 0.7;">(Taking a
                        break)</span></h2>
                <div class="paddle-stack horizontal-stack" id="stack-standby">
                    <!-- Standby paddles will appear here -->
                </div>
            </section>

            <!-- Next Matchups Section -->
            <section class="next-matchups-section glass-panel">
                <h2>Next In Line</h2>
                <div id="nextMatchupsContainer" class="matchups-container">
                    <!-- Matchups will appear here -->
                </div>
            </section>

            <!-- Courts Display Section -->
            <section class="courts-section glass-panel">
                <h2>Active Courts</h2>
                <div id="courtsContainer" class="courts-grid">
                    <!-- Courts will be generated here dynamically -->
                </div>
            </section>

            <!-- MVP Leaderboard Section -->
            <section class="mvp-section">
                <h2>MVP Leaderboard <span style="font-size: 0.8rem; font-weight: 400; opacity: 0.7;">(Win %)</span></h2>
                <div id="mvpContainer" class="mvp-container"></div>
            </section>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAwb_nYHoagATSmGy1TCoZLkt9a9kBfbvQ",
            authDomain: "dinkbai-queueing.firebaseapp.com",
            databaseURL: "https://dinkbai-queueing-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dinkbai-queueing",
            storageBucket: "dinkbai-queueing.firebasestorage.app",
            messagingSenderId: "518522778086",
            appId: "1:518522778086:web:a43380de2a0eaccf3a2627",
            measurementId: "G-CRJRKKM37N"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.firebaseDb = db;
        window.firebaseRef = ref;
        window.firebaseOnValue = onValue;

        window.dispatchEvent(new Event('firebase-ready'));
    </script>
    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-bottom-bar">
        <a href="index.html" class="mobile-nav-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            Player
        </a>

        <a href="ranking.html" class="mobile-nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path>
                <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path>
                <path d="M4 22h16"></path>
                <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path>
                <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path>
                <path d="M18 2H6v7a6 6 0 0 0 12 0V2z"></path>
            </svg>
            Rankings
        </a>
    </nav>
    <script src="app.js?v=40"></script>
    <script>
        function toggleSideMenu() {
            const menu = document.getElementById('sideMenu');
            const overlay = document.getElementById('sideMenuOverlay');
            if (menu && overlay) {
                menu.classList.toggle('active');
                overlay.classList.toggle('active');
            }
        }
    </script>
</body>

</html>
