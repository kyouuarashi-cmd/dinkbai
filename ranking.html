<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dink Bai - Club Rankings</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=43">
    <style>
        .ranking-container {
            width: 100%;
            overflow-x: auto;
        }

        .ranking-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            text-align: left;
        }

        .ranking-table th,
        .ranking-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .ranking-table th {
            background: rgba(15, 23, 42, 0.05);
            font-weight: 600;
            color: var(--text-color);
        }

        .ranking-table tbody tr.main-row {
            transition: background-color 0.2s;
        }

        .ranking-table tbody tr.main-row:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        .details-row {
            display: none;
            background: rgba(0, 0, 0, 0.02);
        }

        .details-row.active {
            display: table-row;
        }

        .details-content {
            padding: 1.5rem;
            border-left: 4px solid var(--primary-color);
        }

        .h2h-table {
            width: 100%;
            max-width: 500px;
            border-collapse: collapse;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .h2h-table th,
        .h2h-table td {
            padding: 0.5rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body>
    <!-- Side Menu -->
    <div id="sideMenuOverlay" class="side-menu-overlay" onclick="toggleSideMenu()"></div>
    <div id="sideMenu" class="side-menu">
        <div class="side-menu-header" style="align-items: center; justify-content: space-between;">
            <img src="graphics/logo/Dinkbai%20logo.png" alt="Dinkbai Logo" style="max-height: 40px; width: auto;">
            <button class="icon-btn" onclick="toggleSideMenu()"
                style="font-size: 1.5rem; line-height: 1;">&times;</button>
        </div>
        <div class="side-menu-content">
            <a href="index.html" class="side-menu-item">Player View</a>
        </div>
    </div>

    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-container">
        <header class="glass-panel" style="display: flex; flex-direction: column; gap: 1rem;">
            <div style="display: flex; align-items: center; width: 100%; flex-wrap: wrap; gap: 1rem;">
                <div style="flex: 1; display: flex; justify-content: flex-start; align-items: center; min-width: max-content;">
                    <div style="cursor: pointer; color: var(--text-color); display: flex; align-items: center;" onclick="toggleSideMenu()" title="Open Menu">
                        <svg viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </div>
                </div>
                <div style="display: flex; justify-content: center; align-items: center;">
                    <img src="graphics/dink%20bai/DINK%20BAI%20TEXT.png" alt="Dink Bai" style="max-height: 36px; width: auto;">
                </div>
                <div style="flex: 1;"></div>
            </div>
        </header>

        <main class="main-content">
            <section class="glass-panel">
                <h2
                    style="font-size: 2rem; text-align: center; margin-bottom: 1rem; border-bottom: 2px solid var(--glass-border); padding-bottom: 1rem;">
                    Club Rankings</h2>

                <div style="display: flex; flex-wrap: wrap; gap: 2rem;">
                    <div class="ranking-container" style="flex: 2 1 250px; min-width: 0; overflow-x: auto;">
                        <table class="ranking-table" id="rankingTable">
                            <thead>
                                <tr>
                                    <th>Rank</th>
                                    <th>Player</th>
                                    <th>Tier</th>
                                    <th>MMR</th>
                                    <th>Matches</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="rankingBody">
                                <tr>
                                    <td colspan="6" style="text-align: center; padding: 2rem; opacity: 0.6;">Loading
                                        rankings...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="recent-matches-container" style="flex: 1 1 250px; min-width: 0;">
                        <h3 style="margin-bottom: 1rem; border-bottom: 2px solid var(--glass-border); padding-bottom: 0.5rem; font-size: 1.5rem;">Recent Matches</h3>
                        <div id="matchHistoryContainer"></div>
                    </div>
                </div>
            </section>
        </main>

        <!-- HIDDEN DOM FOR APP.JS COMPATIBILITY -->
        <div style="display: none;">
            <div id="stack-manual"></div>
            <div id="stack-beginner"></div>
            <div id="stack-intermediate"></div>
            <div id="stack-advanced"></div>
            <div id="stack-standby"></div>
            <div id="nextMatchupsContainer"></div>
            <div id="courtsContainer"></div>
            <div id="mvpContainer"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAwb_nYHoagATSmGy1TCoZLkt9a9kBfbvQ",
            authDomain: "dinkbai-queueing.firebaseapp.com",
            databaseURL: "https://dinkbai-queueing-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dinkbai-queueing",
            storageBucket: "dinkbai-queueing.firebasestorage.app",
            messagingSenderId: "518522778086",
            appId: "1:518522778086:web:a43380de2a0eaccf3a2627",
            measurementId: "G-CRJRKKM37N"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.firebaseDb = db;
        window.firebaseRef = ref;
        window.firebaseOnValue = onValue;

        window.dispatchEvent(new Event('firebase-ready'));
    </script>
    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-bottom-bar">
        <a href="index.html" class="mobile-nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            Player
        </a>

        <a href="ranking.html" class="mobile-nav-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"></path></svg>
            Rankings
        </a>
    </nav>
    <script src="app.js?v=36"></script>
    <script>
        function toggleSideMenu() {
            const menu = document.getElementById('sideMenu');
            const overlay = document.getElementById('sideMenuOverlay');
            if (menu && overlay) {
                menu.classList.toggle('active');
                overlay.classList.toggle('active');
            }
        }

        function toggleDetails(playerId) {
            const row = document.getElementById(`details-${playerId}`);
            if (row) {
                row.classList.toggle('active');
            }
        }

        // getRankTier removed, now using window.getRankBadge from app.js

        window.renderRankings = function () {
            const tbody = document.getElementById('rankingBody');
            if (!tbody) return;

            if (typeof allPlayers === 'undefined') return;

            const eligiblePlayers = Object.values(allPlayers).filter(p => p.matchesPlayed > 0);

            if (eligiblePlayers.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 2rem; opacity: 0.6;">No games completed yet.</td></tr>';
                return;
            }

            eligiblePlayers.sort((a, b) => {
                const mmrA = typeof a.mmr !== 'undefined' ? a.mmr : 1000;
                const mmrB = typeof b.mmr !== 'undefined' ? b.mmr : 1000;
                if (mmrB !== mmrA) return mmrB - mmrA;
                return b.matchesPlayed - a.matchesPlayed;
            });

            let html = '';
            eligiblePlayers.forEach((player, index) => {
                const mmr = typeof player.mmr !== 'undefined' ? player.mmr : 1000;
                const badge = window.getRankBadge ? window.getRankBadge(mmr) : { name: 'Bronze', class: 'rank-bronze' };

                html += `
                    <tr class="main-row">
                        <td><strong>#${index + 1}</strong></td>
                        <td>
                            <div class="player-name-wrapper" style="display: inline-flex;">
                                ${window.renderAvatar ? window.renderAvatar(player) : ''}
                                <span style="margin-left: 8px;">${player.name}</span>
                            </div>
                        </td>
                        <td>
                            <div class="badge-wrapper">
                                <div class="rank-badge ${badge.class}"></div>
                                <span style="font-size: 0.8rem; font-weight: 600; color: var(--text-color);">${badge.name}</span>
                            </div>
                        </td>
                        <td><strong style="font-size: 1.1rem; color: var(--primary-color);">${mmr}</strong></td>
                        <td>${player.matchesPlayed}</td>
                        <td>
                            <button class="btn" style="padding: 0.3rem 0.6rem; font-size: 0.8rem;" onclick="toggleDetails('${player.id}')">H2H Stats</button>
                        </td>
                    </tr>
                    <tr class="details-row" id="details-${player.id}">
                        <td colspan="6" style="padding: 0;">
                            <div class="details-content">
                                <h4 style="margin: 0 0 0.5rem 0; color: #475569;">Head-to-Head Win %</h4>
                `;

                if (!player.headToHead || Object.keys(player.headToHead).length === 0) {
                    html += `<p style="font-size: 0.9rem; opacity: 0.7;">No opponent data yet.</p>`;
                } else {
                    html += `
                                <table class="h2h-table">
                                    <thead>
                                        <tr>
                                            <th style="text-align: left;">Opponent</th>
                                            <th>Matches</th>
                                            <th>Win %</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                    `;

                    const oppIds = Object.keys(player.headToHead);
                    oppIds.sort((a, b) => player.headToHead[b].matches - player.headToHead[a].matches);

                    oppIds.forEach(oppId => {
                        const h2h = player.headToHead[oppId];
                        const opp = allPlayers[oppId];
                        const oppName = opp ? opp.name : 'Unknown Player';
                        const h2hPct = Math.round((h2h.wins || 0) / h2h.matches * 100);

                        html += `
                                        <tr>
                                            <td>${oppName}</td>
                                            <td style="text-align: center;">${h2h.matches}</td>
                                            <td style="text-align: center;">
                                                <span style="font-weight: 600; color: ${h2hPct >= 50 ? 'var(--primary-color)' : '#e11d48'};">${h2hPct}%</span>
                                            </td>
                                        </tr>
                        `;
                    });

                    html += `
                                    </tbody>
                                </table>
                    `;
                }

                html += `
                            </div>
                        </td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        }
    </script>
</body>

</html>
